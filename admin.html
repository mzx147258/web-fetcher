<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 0 20px; }
        input, button { padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; margin: 5px 0; }
        button { background: #2ecc71; color: white; border: none; cursor: pointer; }
        #msg { margin-top: 10px; color: #27ae60; }
    </style>
</head>
<body>
    <h2>🔐 管理员增加次数</h2>
    <input type="password" id="pwd" placeholder="密码" />
    <input type="text" id="targetUser" placeholder="用户ID" />
    <input type="number" id="addNum" placeholder="增加次数" value="10" />
    <button id="addBtn">增加</button>
    <p id="msg"></p>

    <script>
        const API_BASE = 'http://bore.pub:52766';  // 同样替换为你的 bore 地址
        const ADMIN_PASSWORD = 'admin123';  // 与后端密码一致

        document.getElementById('addBtn').onclick = async function() {
            const pwd = document.getElementById('pwd').value;
            const userId = document.getElementById('targetUser').value.trim();
            const increment = parseInt(document.getElementById('addNum').value) || 0;

            if (!userId || increment <= 0) {
                alert('请输入有效信息');
                return;
            }

            const resp = await fetch(`${API_BASE}/api/admin/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    password: pwd,
                    user_id: userId,
                    increment: increment
                })
            });
            const data = await resp.json();
            if (resp.ok) {
                document.getElementById('msg').innerText = `✅ 增加成功，当前剩余 ${data.remaining} 次`;
            } else {
                document.getElementById('msg').innerText = '❌ 失败：' + data.error;
            }
        };
    </script>
</body>
</html>
